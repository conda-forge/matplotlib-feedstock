# Full credit goes to https://github.com/conda/conda-recipes for providing this recipe.
# It has been subsequently adapted for automated building with conda-forge.
# to avoid creating redundant CI jobs, conda-smithy needs python
# to be used in all outputs, including the implicit global one.
schema_version: 1

context:
  version: 3.10.6

recipe:
  name: matplotlib-suite
  version: ${{ version }}

source:
  url: https://github.com/matplotlib/matplotlib/archive/v${{ version }}.tar.gz
  sha256: b553f599f639a9e19074c7e4f8f4343443483da6cd8819fbfcf6506f155ddf0e

build:
  number: 2
  skip: match(python, "<3.10")

outputs:
  - package:
      name: matplotlib-base
    build:
      script:
        - if: win
          then: build_base.bat
          else: build_base.sh
    requirements:
      build:
        - if: build_platform != target_platform
          then: python
        - if: build_platform != target_platform
          then: cross-python_${{ target_platform }}
        - if: build_platform != target_platform
          then: numpy
        - if: build_platform != target_platform
          then: pybind11 >=2.6
        - ${{ stdlib('c') }}
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - if: win
          then: cmake
        - pkg-config
        - if: unix
          then: libtool
        - ninja
      host:
        - python
        - python-build
        - pip
        - meson-python >=0.13.1
        - certifi >=2020.06.20
        - pybind11 >=2.13.2,!=2.13.3
        - freetype
        - qhull
        # freetype.pc requires zlib.pc
        - zlib
        - numpy
        - setuptools >=64
        - setuptools_scm >=7
        - setuptools_scm_git_archive
        - if: linux
          then: tk
      run:
        - python
        - contourpy >=1.0.1
        - cycler >=0.10
        - fonttools >=4.22.0
        - kiwisolver >=1.3.1
        - numpy >=1.23
        - packaging >=20.0
        - pillow >=8
        - pyparsing >=2.3.1
        - python-dateutil >=2.7
        - freetype
        - if: linux
          then: tk
      ignore_run_exports:
        from_package:
          - zlib
    tests:
      - python:
          imports:
            - matplotlib
            - matplotlib.pyplot
            - matplotlib._c_internal_utils
            - matplotlib._image
            - matplotlib._path
            - matplotlib._qhull
            - matplotlib._tri
            - matplotlib.backends._backend_agg
            - matplotlib.ft2font
            - if: not win
              then: matplotlib.backends._tkagg
            - mpl_toolkits
            - pylab
          pip_check: false
  - package:
      name: matplotlib
    requirements:
      host:
        - python
      run:
        - python
        # osx has its own backend; pyside6 not available on ppc
        - if: python_impl == "cpython" and not (osx or ppc64le)
          then: pyside6 >=6.7.2
        - tornado >=5
        - ${{ pin_subpackage('matplotlib-base', upper_bound="x.x.x") }}
    tests:
      - python:
          imports:
            - matplotlib
          pip_check: false

about:
  license: PSF-2.0
  # license_url: http://matplotlib.sourceforge.net/users/license.html
  license_file:
    - LICENSE/LICENSE
    - LICENSE/LICENSE_AMSFONTS
    - LICENSE/LICENSE_BAKOMA
    - LICENSE/LICENSE_CARLOGO
    - LICENSE/LICENSE_COLORBREWER
    - LICENSE/LICENSE_COURIERTEN
    - LICENSE/LICENSE_JSXTOOLS_RESIZE_OBSERVER
    - LICENSE/LICENSE_QT4_EDITOR
    - LICENSE/LICENSE_SOLARIZED
    - LICENSE/LICENSE_STIX
    - LICENSE/LICENSE_YORICK
  summary: Publication quality figures in Python
  description: |
    matplotlib is a python 2D plotting library which produces publication
    quality figures in a variety of hardcopy formats and interactive
    environments across platforms. matplotlib can be used in Python scripts,
    the Python and IPython shell (ala MATLAB or Mathematica), web
    application servers, and six graphical user interface toolkits.
  homepage: http://matplotlib.org/
  repository: https://github.com/matplotlib/matplotlib/
  documentation: http://matplotlib.org/contents.html

extra:
  recipe-maintainers:
    - mdboom
    - ocefpaf
    - pelson
    - tacaswell
    - dopplershift
